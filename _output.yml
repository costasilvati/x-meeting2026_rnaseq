bookdown::gitbook:
  css: style.css
  split_bib: yes 
  config:
    toc:
      collapse: section
      before: |
        <li><a href="https://costasilvati.github.io/x-meeting2026_rnaseq">Expressão Diferencial de Genes com dados de RNA-Seq utilizando a linguagem R</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    edit: https://github.com/costasilvati/x-meeting2026_rnaseq/edit/main/%s
    download: null #["pdf", "epub"]
    toolbar:
      position: fixed #fixed, static
    search: yes
    fontsettings:
      theme: white #white, night, sepia
      family: sans #sans, serif
      size: 2 #1 a 4
    sharing:
      whatsapp: yes
      facebook: yes
      twitter: yes
      linkedin: no
      weibo: no
      instapaper: no
      vk: no
      all: ['whatsapp', 'facebook', 'twitter', 'linkedin']
    info: yes
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: default
